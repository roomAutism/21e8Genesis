<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050805" />
    <meta name="description" content="@OnlineLobotomy" />
    <title>@OnlineLobotomy</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background: #050805 url("background.gif") center center / cover no-repeat fixed;
        color: #ffffff;
        font-family: Arial, Helvetica, sans-serif;
      }

      body::before {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
        background: rgba(0, 0, 0, 0.16);
      }

      main {
        position: relative;
        z-index: 1;
        display: flex;
        width: 100%;
        height: 100svh;
        align-items: flex-end;
        justify-content: center;
        padding: 0 24px clamp(52px, 8vh, 78px);
      }

      .link {
        color: rgba(255, 255, 255, 0.92);
        font-family: "Old English Text MT", "Apple Chancery", Georgia, serif;
        font-size: 18px;
        font-weight: 400;
        letter-spacing: 0.04em;
        line-height: 1;
        text-decoration: none;
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.52);
        transition: opacity 160ms ease;
      }

      .link:hover {
        opacity: 0.68;
        text-decoration: underline;
      }

      .link:focus-visible {
        outline: 1px solid rgba(255, 255, 255, 0.72);
        outline-offset: 6px;
      }

      @media (max-width: 700px) {
        main {
          padding-bottom: 54px;
        }

        .link {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <a class="link" href="https://x.com/OnlineLobotomy" target="_blank" rel="noopener noreferrer">𝕷𝖔𝖇𝖔𝖙𝖔𝖒𝖞-𝕺𝖓𝖑𝖎𝖓𝖊</a>
    </main>
  </body>
</html>
